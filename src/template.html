<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="root">
      <!-- Sidebar -->
      <aside class="sidebar">
        <h2 class="brand">Odin Todo List</h2>

        <!-- Projects -->
        <section class="sidebar-group projects">
          <h4 class="section-heading">Projects</h4>

          <!-- Project Listing -->
          <ul id="project-list" class="item-container"></ul>
        </section>

        <!-- Add Project Button -->
        <button id="add-project-btn" class="add-project-btn">
          Add Project
        </button>
      </aside>

      <!-- Project View -->
      <main class="project-view">
        <header>
          <h2 id="project-view-header" class="project-name">Test</h2>
        </header>

        <!-- Todos -->
        <section class="todos">
          <h3 class="section-header">Todos</h3>

          <ul id="todo-list" class="todo-list"></ul>

          <button id="add-todo-btn" class="add-todo-btn">Add New Todo</button>
        </section>
      </main>
    </div>

    <!-- Dialog box -->
    <dialog id="dialog">
      <h3 id="dialog-heading" class="dialog-heading"></h3>

      <!-- Add / Edit Project View -->
      <form id="project-view" class="dialog-view">
        <div class="input-wrapper">
          <label for="project-name"> Name: </label>
          <input
            type="text"
            id="project-name"
            name="name"
            value=""
            minlength="1"
            maxlength="20"
            required
            autofocus
          />
        </div>

        <div class="controls-wrapper">
          <button class="submit-btn" type="submit">Save</button>
          <button class="cancel-btn" type="button">Cancel</button>
        </div>
      </form>

      <!-- Add / Edit Todo View -->
      <form id="todo-view" class="dialog-view">
        <div class="input-wrapper">
          <label for="todo-title"> Title: </label>
          <input
            type="text"
            id="todo-title"
            name="title"
            minlength="1"
            maxlength="50"
            required
            autofocus
          />
        </div>

        <div class="input-wrapper">
          <label for="todo-desc"> Description: </label>
          <textarea
            id="todo-desc"
            name="description"
            minlength="5"
            maxlength="200"
            rows="3"
          ></textarea>
        </div>

        <div class="input-wrapper">
          <label for="date-due"> Due Date: </label>
          <input type="date" id="date-due" name="dueDate" />
        </div>

        <div class="input-wrapper">
          <label for="todo-priority"> Priority:</label>
          <select id="todo-priority" name="priority" minlength="2">
            <option value="high">High</option>
            <option value="medium" selected>Medium</option>
            <option value="low">Low</option>
          </select>
        </div>

        <div class="input-wrapper">
          <label for="todo-notes"> Notes: </label>
          <textarea
            id="todo-notes"
            name="notes"
            rows="3"
            minlength="2"
            maxlength="200"
          ></textarea>
        </div>

        <div class="controls-wrapper">
          <button class="submit-btn" type="submit">Save</button>
          <button class="cancel-btn" type="button">Cancel</button>
        </div>
      </form>

      <!-- Delete Confirmation View -->
      <form id="confirmation-view" class="dialog-view">
        <p id="message-box" class="message-box"></p>
        <div class="controls-wrapper">
          <button class="submit-btn" type="submit" autofocus>Delete</button>
          <button class="cancel-btn" type="button">Cancel</button>
        </div>
      </form>

      <!-- Error / Info View -->
      <div id="error-info-view" class="dialog-view">
        <p id="error-info-box" class="error-info-box"></p>
        <div class="controls-wrapper">
          <button class="cancel-btn" type="button" autofocus>Close</button>
        </div>
      </div>
    </dialog>
  </body>
</html>
