<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="root">
      <!-- Sidebar -->
      <aside class="sidebar">
        <h2 class="brand">Odin Todo List</h2>

        <!-- Projects -->
        <section class="sidebar-group projects">
          <h4 class="section-heading">Projects</h4>

          <!-- Project Listing -->
          <ul id="project-list" class="item-container">
            <li data-id="default" class="sidebar-item">Default</li>
          </ul>
        </section>

        <!-- Add Project Button -->
        <button id="add-project-btn" class="add-project-btn">
          Add Project
        </button>
      </aside>

      <!-- Project View -->
      <main class="project-view">
        <header>
          <h2 id="project-view-header" class="project-name">Test</h2>
        </header>

        <!-- Todos -->
        <section class="todos">
          <h3 class="section-header">Todos</h3>

          <ul id="todo-list" class="todo-list"></ul>

          <button id="add-todo-btn" class="add-todo-btn">Add Todo</button>
        </section>
      </main>
    </div>

    <!-- Dialog box -->
    <dialog id="dialog">
      <h3 id="dialog-heading" class="dialog-heading"></h3>

      <form id="todoForm" class="dialog-form">
        <div class="input-wrapper">
          <label for="todo-title"> Title: </label>
          <input
            type="text"
            id="todo-title"
            name="title"
            minlength="1"
            maxlength="20"
            required
            autofocus
          />
        </div>

        <div class="input-wrapper">
          <label for="todo-desc"> Description: </label>
          <textarea
            id="todo-desc"
            name="description"
            minlength="5"
            maxlength="200"
            rows="3"
          >
          </textarea>
        </div>

        <div class="input-wrapper">
          <label for="due-date"> Due Date: </label>
          <input type="date" id="date-due" name="dueDate" />
        </div>

        <div class="input-wrapper">
          <label for="priority"> Priority:</label>
          <select id="todo-priority" name="priority" minlength="2">
            <option value="high">High</option>
            <option value="medium" selected>Medium</option>
            <option value="low">Low</option>
          </select>
        </div>

        <div class="input-wrapper">
          <label for="todo-notes"> Notes: </label>
          <textarea
            id="toodo-notes"
            name="notes"
            rows="3"
            minlength="2"
            maxlength="200"
          ></textarea>
        </div>

        <div class="controls-wrapper">
          <button id="cancel-btn" value="cancel">Cancel</button>
          <button id="submit-btn" type="submit">Submit</button>
        </div>
      </form>
    </dialog>
  </body>
</html>
